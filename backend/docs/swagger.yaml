basePath: /api
definitions:
  api.AddDriverReq:
    properties:
      driver:
        $ref: '#/definitions/runner.LangDriver'
      lang:
        example: rust
        type: string
    type: object
  api.CourseDetail:
    properties:
      description:
        type: string
      language:
        type: string
      slug:
        type: string
      title:
        type: string
      tracks:
        items:
          $ref: '#/definitions/api.TrackItem'
        type: array
    type: object
  api.CourseItem:
    properties:
      description:
        type: string
      language:
        type: string
      slug:
        type: string
      title:
        type: string
    type: object
  api.PatchDriverReq:
    properties:
      ext:
        type: string
      run_cmd:
        items:
          type: string
        type: array
      test_cmd:
        items:
          type: string
        type: array
      test_ext:
        type: string
    type: object
  api.ProgressUpdate:
    properties:
      done:
        example: true
        type: boolean
    type: object
  api.RunReq:
    properties:
      code:
        example: |-
          package main
          func main() {}
        type: string
      language:
        example: go
        type: string
      test_code:
        type: string
      timeout_sec:
        example: 10
        type: integer
    type: object
  api.RunResp:
    properties:
      duration_ms:
        type: integer
      exit_code:
        type: integer
      stderr:
        type: string
      stdout:
        type: string
      timed_out:
        type: boolean
    type: object
  api.TaskItem:
    properties:
      languages:
        items:
          type: string
        type: array
      slug:
        type: string
      title:
        type: string
    type: object
  api.TopicItem:
    properties:
      description:
        type: string
      slug:
        type: string
      title:
        type: string
      units:
        items:
          $ref: '#/definitions/api.UnitItem'
        type: array
    type: object
  api.TrackItem:
    properties:
      description:
        type: string
      slug:
        type: string
      title:
        type: string
      topics:
        items:
          $ref: '#/definitions/api.TopicItem'
        type: array
    type: object
  api.UnitItem:
    properties:
      has_theory:
        type: boolean
      slug:
        type: string
      tasks:
        items:
          $ref: '#/definitions/api.TaskItem'
        type: array
      title:
        type: string
    type: object
  progress.Progress:
    properties:
      completed_tasks:
        additionalProperties:
          type: boolean
        type: object
      course_slug:
        type: string
    type: object
  runner.LangDriver:
    properties:
      ext:
        description: source file extension, e.g. ".go"
        type: string
      run_cmd:
        description: e.g. ["go", "run", "{file}"]
        items:
          type: string
        type: array
      test_cmd:
        description: e.g. ["go", "test", "{file}", "{testfile}"]
        items:
          type: string
        type: array
      test_ext:
        description: test file name suffix, e.g. "_test.go"
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Self-hosted programming learning platform
  title: CourseForge API
  version: "1.0"
paths:
  /courses:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.CourseItem'
            type: array
      summary: List all courses
      tags:
      - courses
  /courses/{courseSlug}:
    get:
      parameters:
      - description: Course slug
        in: path
        name: courseSlug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CourseDetail'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get full course tree
      tags:
      - courses
  /courses/{courseSlug}/tracks/{trackSlug}/topics/{topicSlug}/units/{unitSlug}/tasks/{taskSlug}/statement:
    get:
      parameters:
      - description: Course slug
        in: path
        name: courseSlug
        required: true
        type: string
      - description: Track slug
        in: path
        name: trackSlug
        required: true
        type: string
      - description: Topic slug
        in: path
        name: topicSlug
        required: true
        type: string
      - description: Unit slug
        in: path
        name: unitSlug
        required: true
        type: string
      - description: Task slug
        in: path
        name: taskSlug
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get task statement (markdown)
      tags:
      - content
  /courses/{courseSlug}/tracks/{trackSlug}/topics/{topicSlug}/units/{unitSlug}/tasks/{taskSlug}/template:
    get:
      parameters:
      - description: Course slug
        in: path
        name: courseSlug
        required: true
        type: string
      - description: Track slug
        in: path
        name: trackSlug
        required: true
        type: string
      - description: Topic slug
        in: path
        name: topicSlug
        required: true
        type: string
      - description: Unit slug
        in: path
        name: unitSlug
        required: true
        type: string
      - description: Task slug
        in: path
        name: taskSlug
        required: true
        type: string
      - description: Language (e.g. go, python)
        in: query
        name: lang
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get task code template
      tags:
      - content
  /courses/{courseSlug}/tracks/{trackSlug}/topics/{topicSlug}/units/{unitSlug}/tasks/{taskSlug}/tests:
    get:
      parameters:
      - description: Course slug
        in: path
        name: courseSlug
        required: true
        type: string
      - description: Track slug
        in: path
        name: trackSlug
        required: true
        type: string
      - description: Topic slug
        in: path
        name: topicSlug
        required: true
        type: string
      - description: Unit slug
        in: path
        name: unitSlug
        required: true
        type: string
      - description: Task slug
        in: path
        name: taskSlug
        required: true
        type: string
      - description: Language (e.g. go, python)
        in: query
        name: lang
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get task test file
      tags:
      - content
  /courses/{courseSlug}/tracks/{trackSlug}/topics/{topicSlug}/units/{unitSlug}/theory:
    get:
      parameters:
      - description: Course slug
        in: path
        name: courseSlug
        required: true
        type: string
      - description: Track slug
        in: path
        name: trackSlug
        required: true
        type: string
      - description: Topic slug
        in: path
        name: topicSlug
        required: true
        type: string
      - description: Unit slug
        in: path
        name: unitSlug
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get theory file (markdown)
      tags:
      - content
  /progress/{courseSlug}:
    get:
      parameters:
      - description: Course slug
        in: path
        name: courseSlug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/progress.Progress'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get course progress
      tags:
      - progress
  /progress/{courseSlug}/tasks/{taskSlug}:
    put:
      consumes:
      - application/json
      parameters:
      - description: Course slug
        in: path
        name: courseSlug
        required: true
        type: string
      - description: Task slug
        in: path
        name: taskSlug
        required: true
        type: string
      - description: Update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ProgressUpdate'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Mark task done or undone
      tags:
      - progress
  /run:
    post:
      consumes:
      - application/json
      parameters:
      - description: Run request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.RunReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.RunResp'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Execute code
      tags:
      - run
  /runners:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              $ref: '#/definitions/runner.LangDriver'
            type: object
      summary: List registered language drivers
      tags:
      - runners
    post:
      consumes:
      - application/json
      parameters:
      - description: Driver config
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.AddDriverReq'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Add a new language driver
      tags:
      - runners
  /runners/{lang}:
    delete:
      parameters:
      - description: Language key (e.g. go)
        in: path
        name: lang
        required: true
        type: string
      responses:
        "204":
          description: No Content
      summary: Delete a language driver
      tags:
      - runners
    patch:
      consumes:
      - application/json
      parameters:
      - description: Language key (e.g. go)
        in: path
        name: lang
        required: true
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.PatchDriverReq'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Partially update an existing language driver
      tags:
      - runners
schemes:
- http
swagger: "2.0"
